services:
  mongodb:
    image: mongo:7
    container_name: secondseat-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: secondseat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: secondseat-chroma
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  mongo-data:
  redis-data:
  chroma-data:
